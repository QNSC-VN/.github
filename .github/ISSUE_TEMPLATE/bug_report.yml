name: 🐛 Bug Report
description: Report a problem with a QNSC platform service or tool
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill out the sections below
        so we can reproduce and fix the issue quickly.
  - type: input
    id: component
    attributes:
      label: Affected component / repository
      description: Which service or repo is impacted?
      placeholder: e.g. rally-api, opshub-web, qnsc-infra
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and its impact.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Where did this occur?
      placeholder: |
        - Environment: dev / staging / production
        - Version / commit:
        - Browser / OS (if relevant):
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Paste any logs or attach screenshots. Do not include secrets or credentials.
      render: shell
    validations:
      required: false
